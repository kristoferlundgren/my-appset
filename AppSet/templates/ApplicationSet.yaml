--- # <- Keep YAML delimiter
# See this doc to understand the '{{`{{ [...] }}`}}' syntax:
# - <https://kyverno.io/docs/policy-types/cluster-policy/variables/#variables-in-helm>
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
# https://argo-cd.readthedocs.io/en/stable/operator-manual/applicationset/
metadata:
  namespace: {{ .Values.namespace }}
  name: appset.{{ .Values.name }}
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    # https://argo-cd.readthedocs.io/en/latest/operator-manual/applicationset/Generators-Git/
    - git:
        repoURL: {{ .Values.repoURL }}
        revision: {{ .Values.revision }}
        requeueAfterSeconds: 60 # Pull repo every x seconds
        files:
          # NOTE: Do enable ArgoCD improved globbing
          # https://argo-cd.readthedocs.io/en/stable/operator-manual/applicationset/Generators-Git-File-Globbing/#enabling-the-new-globbing
          - path: {{ .Values.path }}/*/app.yaml # Deploy all apps
          - path: {{ .Values.path }}/*/*.app.yaml # Support multiple app.yaml files per app.
          - path: {{ .Values.path }}/app.template/* # Exclude app.template
            exclude: true

        # https://argo-cd.readthedocs.io/en/stable/operator-manual/applicationset/Generators-Git/#pass-additional-key-value-pairs-via-values-field
        values:
          applicationProject: {{ .Values.applicationProject }}
          clusterURL: https://kubernetes.default.svc
          repoURL: {{ .Values.repoURL }}
          targetRevision: {{ .Values.revision }}
          namespace: {{ .Values.namespace }}
  ignoreApplicationDifferences:
    # https://argo-cd.readthedocs.io/en/stable/operator-manual/applicationset/Controlling-Resource-Modification/#allow-temporarily-toggling-auto-sync
    - jsonPointers:
        - /spec/syncPolicy
  syncPolicy:
    # https://argo-cd.readthedocs.io/en/stable/operator-manual/applicationset/Controlling-Resource-Modification/#managed-applications-modification-policies
    applicationsSync: sync # create-only, create-update, create-delete, sync (default)
  template:
    metadata:
      annotations:
        argocd.argoproj.io/compare-options: ServerSideDiff=true,IncludeMutationWebhook=true,IgnoreExtraneous
        argocd.argoproj.io/sync-wave: "0"
        basenameNormalized: '{{`{{.path.basenameNormalized}}`}}'
        basename: '{{`{{.path.basename}}`}}'
      finalizers:
        # https://argo-cd.readthedocs.io/en/latest/user-guide/app_deletion/#about-the-deletion-finalizer
        - resources-finalizer.argocd.argoproj.io
      name: '{{`{{.values.namespace}}`}}.{{`{{.path.basenameNormalized | lower}}`}}'
    spec:
      # --- DEFAULTS ---
      project: '{{`{{.values.applicationProject}}`}}' # TODO: Redundant project config?
      syncPolicy:
        automated:
          enabled: true
          prune: true
          selfHeal: true
          allowEmpty: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
      destination:
        namespace: '{{`{{.path.basenameNormalized}}`}}'
        server: '{{`{{.values.clusterURL}}`}}'
      source:
        repoURL: '{{`{{.values.repoURL}}`}}'
        targetRevision: '{{`{{.values.targetRevision}}`}}'
        path: '{{`{{.path.path}}`}}'
        helm:
          releaseName: '{{`{{.path.basenameNormalized}}`}}'
          valueFiles:
            # https://argo-cd.readthedocs.io/en/stable/user-guide/multiple_sources/#helm-value-files-from-external-git-repository
            # Resolves to the values.yaml file sitting next to the discovered app.yaml
            - '$values/{{`{{.path.path}}`}}/values.yaml'
          # ignoreMissingValueFiles: true # TODO: Re-enable (debugging)
  # --- OVERRIDES ---
  # Application overrides from the app.yaml files in Git repo:
  # Zero overrides is still a valid YAML file, and will use the template values above.
  # https://argo-cd.readthedocs.io/en/stable/operator-manual/applicationset/Template/#template-patch
  # https://argo-cd.readthedocs.io/en/stable/user-guide/application-specification/
  templatePatch: |
    {{`{{- if or (hasKey . "metadata") (hasKey . "spec") }}`}}
    {{`{{- if hasKey . "metadata" }}`}}
    metadata:
      {{`{{- if hasKey .metadata "annotations" }}`}}
      annotations:
        # argocd.argoproj.io/sync-wave
        {{`{{- if hasKey .metadata.annotations "argocd.argoproj.io/sync-wave" }}`}}
        argocd.argoproj.io/sync-wave: {{`{{ index .metadata.annotations "argocd.argoproj.io/sync-wave" | quote }}`}}
        {{`{{- end }}`}}
      {{`{{- end }}`}}

      # finalizers
      {{`{{- if hasKey .metadata "finalizers" }}`}}
      finalizers: '{{`{{ .metadata.finalizers | quote }}`}}'
      {{`{{- end }}`}}
    {{`{{- end }}`}}

    {{`{{- if hasKey . "spec" }}`}}
    spec:
      {{`{{- if hasKey .spec "source" }}`}}
      source:
        # repoURL
        {{`{{- if hasKey .spec.source "repoURL" }}`}}
        repoURL: {{`{{ .spec.source.repoURL | quote }}`}}
        {{`{{- end }}`}}

        # targetRevision
        {{`{{- if hasKey .spec.source "targetRevision" }}`}}
        targetRevision: {{`{{ .spec.source.targetRevision | quote }}`}}
        {{`{{- end }}`}}

        # path
        {{`{{- if hasKey .spec.source "path" }}`}}
        path: {{`{{ .spec.source.path | quote }}`}}
        {{`{{- end }}`}}

        # chart
        {{`{{- if hasKey .spec.source "chart" }}`}}
        chart: {{`{{ .spec.source.chart | quote }}`}}
        path: null
        {{`{{- end }}`}}

        # helm
        {{`{{- if hasKey .spec.source "helm" }}`}}
        helm: '{{`{{ .spec.source.helm | quote }}`}}'
        {{`{{- end }}`}}

        # kustomize
        {{`{{- if hasKey .spec.source "kustomize" }}`}}
        kustomize: '{{`{{ .spec.source.kustomize | quote }}`}}'
        {{`{{- end }}`}}

        # directory
        {{`{{- if hasKey .spec.source "directory" }}`}}
        directory: '{{`{{ .spec.source.directory | quote }}`}}'
        {{`{{- end }}`}}

        # plugin
        {{`{{- if hasKey .spec.source "plugin" }}`}}
        plugin: '{{`{{ .spec.source.plugin | quote }}`}}'
        {{`{{- end }}`}}

      # sources
      {{`{{- if hasKey .spec.source "sources" }}`}}
      sources: '{{`{{ .spec.source.sources | quote }}`}}'
      {{`{{- end }}`}}
      {{`{{- end }}`}}

      {{`{{- if hasKey .spec "destination" }}`}}
      destination:
        # namespace
        {{`{{- if hasKey .spec.destination "namespace" }}`}}
        namespace: {{`{{ .spec.destination.namespace | quote }}`}}
        {{`{{- end }}`}}

        # server
        {{`{{- if hasKey .spec.destination "server" }}`}}
        server: {{`{{ .spec.destination.server | quote }}`}}
        {{`{{- end }}`}}
      {{`{{- end }}`}}

      # info
      {{`{{- if hasKey .spec "info" }}`}}
      info: '{{`{{ .spec.info | quote }}`}}'
      {{`{{- end }}`}}

      {{`{{- if hasKey .spec "syncPolicy" }}`}}
      syncPolicy:
        # automated
        {{`{{- if hasKey .spec.syncPolicy "automated" }}`}}
        automated: '{{`{{ .spec.syncPolicy.automated | quote }}`}}'
        {{`{{- end }}`}}

        # syncOptions
        {{`{{- if hasKey .spec.syncPolicy "syncOptions" }}`}}
        syncOptions: '{{`{{ .spec.syncPolicy.syncOptions | quote }}`}}'
        {{`{{- end }}`}}

        # managedNamespaceMetadata
        {{`{{- if hasKey .spec.syncPolicy "managedNamespaceMetadata" }}`}}
        managedNamespaceMetadata: '{{`{{ .spec.syncPolicy.managedNamespaceMetadata | quote }}`}}'
        {{`{{- end }}`}}

        # retry
        {{`{{- if hasKey .spec.syncPolicy "retry" }}`}}
        retry: '{{`{{ .spec.syncPolicy.retry | quote }}`}}'
        {{`{{- end }}`}}
      {{`{{- end }}`}}

      # syncPolicy
      {{`{{- if hasKey .spec "syncPolicy" }}`}}
      syncPolicy: '{{`{{ .spec.syncPolicy | quote }}`}}'
      {{`{{- end }}`}}

      # ignoreDifferences
      {{`{{- if hasKey .spec "ignoreDifferences" }}`}}
      ignoreDifferences: '{{`{{ .spec.ignoreDifferences | quote }}`}}'
      {{`{{- end }}`}}

      # sourceHydrator
      {{`{{- if hasKey .spec "sourceHydrator" }}`}}
      sourceHydrator: '{{`{{ .spec.sourceHydrator | quote }}`}}'
      {{`{{- end }}`}}
    {{`{{- end }}`}}
    {{`{{- else }}`}}
    {}
    {{`{{- end }}`}}
